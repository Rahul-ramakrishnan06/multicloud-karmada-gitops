# ============================================================================
# ROOT GitOps ENTRYPOINT  (App-of-Apps + cluster registration + app fan-out)
# Apply once at bootstrap:  kubectl apply -f karmada-gitops/argocd/argocd.yml
# ============================================================================

# ----------------------------------------------------------------------------
# 1. ROOT — self-manages this argocd/ directory so the entrypoint is GitOps'd.
# ----------------------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Rahul-ramakrishnan06/multicloud-karmada-gitops.git
    targetRevision: HEAD
    path: karmada-gitops/argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
# ----------------------------------------------------------------------------
# 2. CLUSTER REGISTRY — reads the global values.yml and renders one ArgoCD
#    cluster Secret per alias (registration + registry projection).
#    Multi-source: git repo exposes values.yml via $values; the cluster-registry
#    chart consumes it. This is HOW values.yml becomes the single source of truth.
# ----------------------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-registry
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"   # register clusters before any app syncs
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://github.com/Rahul-ramakrishnan06/multicloud-karmada-gitops.git
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/Rahul-ramakrishnan06/multicloud-karmada-gitops.git
      targetRevision: HEAD
      path: karmada-gitops/argocd/cluster-registry
      helm:
        valueFiles:
          - $values/karmada-gitops/values.yml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
# ----------------------------------------------------------------------------
# 3. ROUTING — App-of-Apps over each layer. Applies ONLY the per-app
#    templates/argocd.yml manifests (include filter skips chart.yml / value.yml
#    / node.yml, which are data, not k8s manifests). Each app owns its own
#    ApplicationSet under <app>/templates/argocd.yml.
# ----------------------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: routing
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - layer: base
          - layer: aws-clusters
          - layer: gcp-clusters
  template:
    metadata:
      name: 'routing-{{ .layer }}'
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: https://github.com/Rahul-ramakrishnan06/multicloud-karmada-gitops.git
        targetRevision: HEAD
        path: 'karmada-gitops/{{ .layer }}'
        directory:
          recurse: true
          include: '*/templates/argocd.yml'
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
