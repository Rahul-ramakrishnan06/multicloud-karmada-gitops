{{- /*
  One ArgoCD cluster Secret per alias in the global registry (values.yml).
  Registry data is projected onto labels (selectable by ApplicationSet
  generators) and annotations (injectable into Helm values at sync time).

  Connection credentials are NOT committed to git. The `config` below carries
  only non-secret connection shape; bearerToken / CA are injected into each
  Secret out-of-band by external-secrets (see base/external-secrets).
*/ -}}
{{- range .Values.clusters }}
apiVersion: v1
kind: Secret
metadata:
  name: cluster-{{ .alias }}
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
    cluster-alias: {{ .alias }}
    cloud: {{ .cloud }}
    environment: {{ .environment }}
  annotations:
    cluster-name: {{ .clusterName | quote }}
    cluster-region: {{ .region | quote }}
    cluster-vpc-id: {{ .vpc.id | quote }}
    {{- if eq .identity.type "irsa" }}
    cluster-role-arn: {{ .identity.roleArn | quote }}
    {{- else if eq .identity.type "workload-identity" }}
    cluster-gsa: {{ .identity.gsa | quote }}
    {{- end }}
type: Opaque
stringData:
  name: {{ .alias }}
  server: {{ .server }}
  config: |
    {
      "tlsClientConfig": {
        "insecure": false
      }
    }
---
{{- end }}
