# Per-app ApplicationSet — redis.
# Static manifest, applied by the routing Application (argocd/argocd.yml).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: redis
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - clusters:
        selector:
          matchExpressions:
            - key: cluster-alias
              operator: In
              values:
                - prod-aws
                - dr-aws
  template:
    metadata:
      name: 'redis-{{ .metadata.labels.cluster-alias }}'
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        - repoURL: https://github.com/Rahul-ramakrishnan06/multicloud-karmada-gitops.git
          targetRevision: HEAD
          ref: values
        - repoURL: https://charts.bitnami.com/bitnami
          chart: redis
          targetRevision: 19.6.4
          helm:
            valueFiles:
              - $values/karmada-gitops/aws-clusters/redis/values/node.yml
      destination:
        server: '{{ .server }}'
        namespace: redis
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
