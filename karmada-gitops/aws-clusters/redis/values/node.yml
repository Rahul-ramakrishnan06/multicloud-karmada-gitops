# App-generic Helm value overrides for Redis.
# https://artifacthub.io/packages/helm/bitnami/redis
# No per-cluster values here.

architecture: replication
auth:
  enabled: true
master:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
replica:
  replicaCount: 2
