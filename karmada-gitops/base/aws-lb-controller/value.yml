# APPLICATION CONFIG — aws-lb-controller
# References clusters ONLY by alias (resolved from global values.yml).
# No raw cluster details here (no VPC, no region).
# Consumed by the central ApplicationSet (karmada-gitops/argocd/argocd.yml).

# App identity + target namespace.
appName: aws-lb-controller
namespace: kube-system

# Clusters this app deploys to — alias only.
clusterAliases:
  - prod-aws
  - dr-aws

# Upstream Helm chart reference.
# https://artifacthub.io/packages/helm/aws/aws-load-balancer-controller
chart:
  repoURL: https://aws.github.io/eks-charts
  name: aws-load-balancer-controller
  version: 1.7.2

# App-generic Helm value overrides + resources live in values/node.yml.
valuesFile: values/node.yml
