# App-generic Helm value overrides for the AWS Load Balancer Controller.
# Upstream chart: https://artifacthub.io/packages/helm/aws/aws-load-balancer-controller
# Repo: https://aws.github.io/eks-charts  (chart: aws-load-balancer-controller)
#
# NO per-cluster values here. clusterName / region / vpcId / serviceAccount
# identity are resolved per-target from the registry (karmada-gitops/values.yml)
# by alias and injected at sync time by the ApplicationSet.

serviceAccount:
  create: true
  name: aws-load-balancer-controller

replicaCount: 2

enableServiceMutatorWebhook: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi
