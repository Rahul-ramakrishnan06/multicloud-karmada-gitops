# Per-app ApplicationSet — external-secrets.
# Static manifest, applied by the routing Application (argocd/argocd.yml).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: external-secrets
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - clusters:
        selector:
          matchExpressions:
            - key: cluster-alias
              operator: In
              values:
                - prod-aws
                - dr-aws
                - dev-gcp
  template:
    metadata:
      name: 'external-secrets-{{ .metadata.labels.cluster-alias }}'
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        - repoURL: https://github.com/Rahul-ramakrishnan06/multicloud-karmada-gitops.git
          targetRevision: HEAD
          ref: values
        - repoURL: https://charts.external-secrets.io
          chart: external-secrets
          targetRevision: 0.9.20
          helm:
            valueFiles:
              - $values/karmada-gitops/base/external-secrets/values/node.yml
            # SA identity resolved per-target from the registry (AWS IRSA role-arn).
            # gcp uses Workload Identity (cluster-gsa) — see values.yml.
            valuesObject:
              serviceAccount:
                annotations:
                  eks.amazonaws.com/role-arn: '{{ .metadata.annotations.cluster-role-arn }}'
      destination:
        server: '{{ .server }}'
        namespace: external-secrets
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
